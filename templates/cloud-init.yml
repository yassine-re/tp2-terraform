#cloud-config
package_update: true
packages:
  - nginx
write_files:
  - path: /var/www/html/index.html
    content: |
      <html>
      <body>
      <h1>ShopEasy - serveur web ${server_index}</h1>
      <p>Deploiement realise avec Terraform sur Azure.</p>
      </body>
      </html>
runcmd:
  - systemctl enable nginx
  - systemctl restart nginx
